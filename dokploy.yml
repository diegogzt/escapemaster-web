# dokploy.yml — Escapemaster Frontend
# https://www.dokploy.com/docs/deploy/configuration
#
# Per-environment variables to set in Dokploy UI:
#   Preproduction (preproduction-v2 branch):
#     NEXT_PUBLIC_API_URL = https://my.escapemaster.es/api/v2
#     NEXT_PUBLIC_APP_URL = https://my.escapemaster.es
#   Production (production-v1 branch):
#     NEXT_PUBLIC_API_URL = https://my.escapemaster.es/api/v1
#     NEXT_PUBLIC_APP_URL = https://my.escapemaster.es

services:
  - name: escapemaster-frontend
    buildType: dockerfile
    dockerfilePath: Dockerfile.production
    port: 9003
    environmentVariables:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    domains:
      - name: my.escapemaster.es
        https: true
        port: 9003
    healthCheck:
      path: /
      interval: 30
